<!DOCTYPE html>
<html lang="en">
<head><title>Test Page</title>
<style>
  body { margin: 0; font-family: system-ui; background: #0F172A; color: #E2E8F0; }
  header { display: flex; align-items: center; height: 48px; padding: 0 16px; background: #1E293B; border-bottom: 1px solid #334155; }
  nav { width: 48px; height: calc(100vh - 48px); background: #1E293B; position: fixed; left: 0; top: 48px; }
  nav button { display: block; width: 48px; height: 48px; background: none; border: none; color: #94A3B8; cursor: pointer; }
  main { margin-left: 48px; margin-top: 48px; padding: 24px; }
  .card { background: #1A2232; border: 1px solid #2A3448; border-radius: 8px; padding: 16px; width: 200px; }
  .card h3 { margin: 0 0 8px; font-size: 14px; }
  .card p { margin: 0; font-size: 12px; color: #94A3B8; }
  footer { position: fixed; bottom: 0; left: 48px; right: 0; height: 32px; background: #1E293B; padding: 0 16px; display: flex; align-items: center; font-size: 11px; color: #64748B; }
</style>
</head>
<body>
  <header role="banner">
    <span style="font-weight:700;color:#2DD4BF">TESTAPP</span>
    <span style="margin:0 8px;color:#475569">/</span>
    <span>Dashboard</span>
  </header>
  <nav role="navigation" aria-label="Main navigation">
    <button aria-label="Home">H</button>
    <button aria-label="Settings">S</button>
    <button aria-label="Help">?</button>
  </nav>
  <main role="main">
    <div class="card" data-testid="device-1">
      <h3>Router A</h3>
      <p>192.168.1.1</p>
    </div>
    <div class="card" data-testid="device-2">
      <h3>Switch B</h3>
      <p>192.168.1.2</p>
    </div>
  </main>
  <footer role="contentinfo">
    <span>Status: Online</span>
  </footer>

  <!-- Edge cases for invariant check testing -->
  <div data-testid="transparent-bug" style="width:100px;height:50px;background:rgba(0,0,0,0);position:absolute;top:400px;left:100px;">Transparent BG</div>
  <div data-testid="overflow-bug" style="width:60px;overflow:hidden;white-space:nowrap;position:absolute;top:460px;left:100px;">This text is way too long for the container</div>
  <div data-testid="zero-size-bug" style="width:0;height:0;position:absolute;top:520px;left:100px;">Hidden</div>
</body>
</html>
